<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Магазин электроники{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        .product-list { display: flex; flex-wrap: wrap; gap: 20px; }
        .product-card { border: 1px solid #ddd; padding: 15px; width: 250px; }
    </style>
</head>
<body>
    <nav><a href="{% url 'store:product_list' %}">Главная</a></nav>
    <main>{% block content %}{% endblock %}</main>
</body>
</html>
